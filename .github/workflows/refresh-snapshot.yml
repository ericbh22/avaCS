name: Refresh calendar snapshot

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Build weekly snapshot
        run: node scripts/pull-calendars.mjs --out data/calendars.json

      - name: Commit snapshot
        run: |
          git config user.name "avaCS bot"
          git config user.email "bot@example.com"
          git add data/calendars.json
          git commit -m "chore: refresh calendar snapshot" || echo "No changes"

      - name: Push changes
        if: success()
        run: git push
